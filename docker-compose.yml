services:
  db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: authpass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authuser -d authdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    image: auth-service:main
    container_name: auth-service
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      # OJO: aquí hay que poner el connection string correcto para TU app
      # Si tu app usa "ConnectionStrings:DefaultConnection", esto funciona:
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=authdb;Username=authuser;Password=authpass